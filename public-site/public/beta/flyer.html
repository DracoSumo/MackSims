<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MackSims beta flyer (print) | MackSims</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="/css/site.css" />
  <style>
    .flyer {
      max-width: 720px;
      margin: 40px auto;
      padding: 36px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--surface);
      text-align: center;
    }
    .flyer h1 { margin: 12px 0 8px; font-size: 2rem; }
    .flyer p { color: var(--muted); margin: 0 auto 20px; max-width: 420px; }
    .flyer img {
      width: min(280px, 70vw);
      height: auto;
      background: #fff;
      padding: 12px;
      border-radius: 12px;
      image-rendering: pixelated;
    }
    .flyer .url { font-size: 1.1rem; margin-top: 16px; }
    .flyer-actions { margin-top: 28px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    @media print {
      .site-header, .site-footer, .flyer-actions, .skip-link { display: none !important; }
      .flyer { border: none; box-shadow: none; margin: 0; }
      body { background: #fff; color: #000; }
      .flyer p, .flyer .url { color: #111; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-logo" href="/">MackSims</a>
      <nav class="site-nav" aria-label="Main">
        <a href="/beta/">Beta</a>
        <a class="nav-cta" href="/beta/#join">Sign up</a>
      </nav>
    </div>
  </header>
  <main id="main">
    <article class="flyer">
      <span class="section-label">External beta</span>
      <h1>Join the MackSims beta</h1>
      <p>One signup for web demos, TestFlight, and Google Play closed testing.</p>
      <img src="/images/qr/macksims-beta-print.png" width="1024" height="1024" alt="QR code for https://www.macksims.com/beta/" />
      <p class="url"><a href="https://www.macksims.com/beta/">www.macksims.com/beta</a></p>
      <p>Feedback: feedback@macksims.com</p>
      <div class="flyer-actions">
        <button class="btn btn-gold" type="button" onclick="window.print()">Print flyer</button>
        <a class="btn" href="/beta/#qr">Back to QR pack</a>
      </div>
    </article>
  </main>
</body>
</html>
