          npm run build

      - name: Prepare Capacitor web directory
        script: |
          set -ex
          cd "$SHUTTERBID_ROOT"
          rm -rf dist
          mkdir -p dist
          # Next.js build output — adjust if you add `output: 'export'` later.
          if [ -d out ]; then
            cp -R out/. dist/
          elif [ -d .next/standalone ]; then
            cp -R .next/standalone/. dist/
          else
            cp -R public/. dist/ 2>/dev/null || true
            [ -f public/index.html ] && cp public/index.html dist/ || true
          fi
          test -f dist/index.html || echo "WARN: dist/index.html missing — verify web export strategy"

