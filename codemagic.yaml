# MackSims — FishCrew + ShutterBid + four hybrid beta apps (Codemagic)
#
# Store publishing (TestFlight / Google Play) is OFF by default.
# Signed artifacts (.ipa / .aab) are uploaded as build artifacts only.
# See docs/NATIVE_EXTERNAL_TESTING.md and docs/store-launch/ for owner steps.
#
# Hybrid apps (CurbCue, MotoCrew, CoachCore, Sermon Studio) load production
# Netlify URLs via Capacitor server.url — see per-app capacitor.config.ts.
#
# BLOCKER: Mobile app sources are not yet vendored in this repo. Before the
# first green build, either:
#   1. Add sources under apps/fishcrew-static-v070 and apps/shutterbid, OR
#   2. Set FISHCREW_GIT_URL / SHUTTERBID_GIT_URL in Codemagic environment.
#
# ShutterBid also has a diagnostic workflow in its own repo (shutterbid-ios).
# Prefer this file once MackSims is the Codemagic-connected repository.

workflows:
  fishcrew-ios-signed:
    name: FishCrew iOS (signed IPA)
    instance_type: mac_mini_m2
    max_build_duration: 120
    # Manual builds only — add `triggering:` when you want branch/tag automation.
    integrations:
      app_store_connect: codemagic-shutterbid
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.chrissims.fishcrew
      vars:
        APP_NAME: FishCrew
        BUNDLE_ID: com.chrissims.fishcrew
        APP_STORE_APPLE_ID: "6783567028"
        FISHCREW_SOURCE_DIR: apps/fishcrew-static-v070
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        CAPACITOR_WEB_DIR: dist
      xcode: latest
      node: latest
      cocoapods: default
    scripts:
      - name: Resolve FishCrew source
        script: |
          set -ex
          SRC="${FISHCREW_SOURCE_DIR:-apps/fishcrew-static-v070}"
          if [ ! -d "$SRC" ]; then
            if [ -n "$FISHCREW_GIT_URL" ]; then
              git clone --depth 1 "$FISHCREW_GIT_URL" "$SRC"
            else
              echo "ERROR: FishCrew source missing at $SRC"
              echo "Vendor apps/fishcrew-static-v070 or set FISHCREW_GIT_URL in Codemagic."
              exit 1
            fi
          fi
          echo "FISHCREW_ROOT=$CM_BUILD_DIR/$SRC" >> $CM_ENV
          cd "$SRC"
          ls -la

      - name: Prepare static web bundle
        script: |
          set -ex
          cd "$FISHCREW_ROOT"
          rm -rf dist
          mkdir -p dist
          cp index.html manifest.webmanifest styles.css app.js config.js dist/ 2>/dev/null || true
          for dir in public assets css js images; do
            [ -d "$dir" ] && cp -R "$dir" dist/
          done
          test -f dist/index.html

      - name: Add Capacitor iOS wrapper
        script: |
          set -ex
          cd "$FISHCREW_ROOT"
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          if [ ! -f capacitor.config.json ] && [ ! -f capacitor.config.ts ]; then
            npx cap init "$APP_NAME" "$BUNDLE_ID" --web-dir="$CAPACITOR_WEB_DIR"
          fi
          [ -d ios ] || npx cap add ios
          npx cap sync ios
          cd ios/App && pod install

      - name: Set up iOS code signing
        script: xcode-project use-profiles

      - name: Increment iOS build number
        script: |
          set -ex
          cd "$FISHCREW_ROOT/ios/App"
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" || echo 0)
          agvtool new-version -all $(($LATEST + 1))

      - name: Build signed IPA
        script: |
          set -ex
          xcode-project build-ipa \
            --workspace "$FISHCREW_ROOT/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

