          echo "SERMON_STUDIO_ROOT=$CM_BUILD_DIR/$SRC" >> $CM_ENV
          test -d "$SRC"
      - name: Prepare hybrid Capacitor Android
        script: |
          set -ex
          chmod +x scripts/codemagic-hybrid-capacitor.sh
          ./scripts/codemagic-hybrid-capacitor.sh "$SERMON_STUDIO_ROOT" android
      - name: Build signed Android App Bundle
        script: |
          set -ex
          chmod +x scripts/codemagic-android-bundle.sh
          ./scripts/codemagic-android-bundle.sh "$SERMON_STUDIO_ROOT/android"
    artifacts:
      - $SERMON_STUDIO_ROOT/android/app/build/outputs/**/*.aab

