<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1410" />
    <title>Sermon Studio</title>
    <style>
      :root { color-scheme: dark; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        display: grid; place-items: center; min-height: 100vh; margin: 0; padding: 24px;
        background: #1a1410; color: #faf6f0; box-sizing: border-box;
      }
      main { max-width: 22rem; text-align: center; }
      .brand { font-size: 1.75rem; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
      p { margin: 0 0 1rem; line-height: 1.5; color: #b8a898; }
      a { color: #e8c896; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">Sermon Studio</div>
      <p id="status">Loading…</p>
      <p><a id="open" href="https://sermon-studio-beta.netlify.app/">Open Sermon Studio</a></p>
    </main>
    <script>
      (function () {
        var TARGET = "https://sermon-studio-beta.netlify.app/";
        var statusEl = document.getElementById("status");
        document.getElementById("open").setAttribute("href", TARGET);
        try { location.replace(TARGET); }
        catch (err) { statusEl.textContent = "Could not auto-open. Tap the link below."; }
        setTimeout(function () {
          if (document.visibilityState === "visible") {
            statusEl.textContent = "Still loading… If nothing appears, check your connection and tap Open Sermon Studio.";
          }
        }, 4000);
      })();
    </script>
  </body>
</html>
