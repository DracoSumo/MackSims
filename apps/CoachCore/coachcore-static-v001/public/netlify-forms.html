<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CoachCore Netlify Forms</title>
  </head>
  <body>
    <!-- Netlify scans this file at deploy time to register coachcore-beta -->
    <form name="coachcore-beta" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="coachcore-beta" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="organization" />
      <input name="lane" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
